<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TheoGen PRO Online</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #1e1e1e;
    color: white;
}
.container {
    margin-top: 40px;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}
input {
    margin-top: 10px;
}
img {
    margin-top: 20px;
    max-width: 200px;
}
</style>
</head>
<body>

<div class="container">
    <h1>TheoGen PRO Online</h1>
    <p>Convierte tu imagen en plugin fácilmente</p>

    <input type="file" id="imageInput" accept="image/*"><br>
    <img id="preview" src=""><br>

    <button onclick="generatePlugin()">Generar Plugin</button>
</div>

<script>
let uploadedImage = null;

document.getElementById("imageInput").addEventListener("change", function(event) {
    const file = event.target.files[0];
    if (file) {
        uploadedImage = file;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("preview").src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});

async function generatePlugin() {
    if (!uploadedImage) {
        alert("Primero sube una imagen.");
        return;
    }

    const zip = new JSZip();
    zip.file("plugin.txt", "Plugin generado con TheoGen PRO Online");

    const imgData = await uploadedImage.arrayBuffer();
    zip.file("image.png", imgData);

    zip.generateAsync({type:"blob"}).then(function(content) {
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = "TheoGenPlugin.zip";
        link.click();
    });
}
</script>

</body>
</html>
