<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TheoGen PRO 4.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body { font-family: Arial; background:#121212; color:white; text-align:center; }
.container { margin-top:30px; }
.card { background:#1e1e1e; padding:20px; width:480px; margin:auto; border-radius:10px; }
input, select { width:90%; padding:8px; margin:5px; }
button { padding:10px; width:95%; margin-top:10px; background:#00c853; border:none; color:white; font-weight:bold; cursor:pointer; }
.building-preview { margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center; gap:15px; }
.preview-card { background:#2a2a2a; padding:10px; border-radius:8px; width:150px; text-align:center; }
.preview-card img { width:100px; height:100px; border-radius:5px; margin-bottom:5px; }
.mini-map { display:grid; margin:5px auto; grid-gap:2px; }
.mini-cell { width:20px; height:20px; background:#555; border:1px solid #333; }
</style>
</head>
<body>

<div class="container">
<h1>TheoGen PRO 4.2</h1>
<div class="card">

<input type="text" id="buildingName" placeholder="Nombre del edificio">

<select id="type">
<option value="residential">Residencial</option>
<option value="commercial">Comercial</option>
<option value="industrial">Industrial</option>
</select>

<input type="number" id="size" placeholder="Tamaño (1-10)" min="1" max="10" value="1">

<input type="number" id="floors" placeholder="Número de pisos" min="1">
<input type="number" id="capacity" placeholder="Capacidad (automática)" readonly>

<input type="color" id="color" value="#ff0000">
<input type="number" id="basePrice" placeholder="Precio base por piso" value="150" min="1">
<input type="number" id="maxLevel" placeholder="Nivel máximo" value="5" min="1" max="5">
<input type="number" id="incomeBonus" placeholder="Bonus ingresos (%)" value="0" min="0" max="200">

<input type="file" id="imageInput" accept="image/*" multiple>

<div class="building-preview" id="previewContainer"></div>

<button onclick="generatePlugin()">Generar Plugin</button>

</div>
</div>

<script>
let uploadedImages = [];

function sanitizeFileName(name){
    return name.replace(/[^a-z0-9_\- ]/gi, "").trim();
}

function updateCapacity(){
    const type = document.getElementById("type").value;
    const sizeMultiplier = parseInt(document.getElementById("size").value);
    let floors = parseInt(document.getElementById("floors").value);
    if(isNaN(floors) || floors < 1) floors = 1;

    let base = 0;
    if(type === "residential") base = 8;
    if(type === "commercial") base = 5;
    if(type === "industrial") base = 4;

    const capacity = floors * (sizeMultiplier * sizeMultiplier) * base;
    document.getElementById("capacity").value = capacity;
}

function getImageSize(multiplier){
    return 128 * multiplier;
}

async function resizeImage(file, multiplier){
    return new Promise(resolve=>{
        const img = new Image();
        img.onload = function(){
            const canvas = document.createElement("canvas");
            const size = getImageSize(multiplier);
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, size, size);
            canvas.toBlob(blob => resolve(blob), "image/png");
        };
        img.src = URL.createObjectURL(file);
    });
}

function generateMiniMap(size){
    const map = document.createElement("div");
    map.className = "mini-map";
    map.style.gridTemplateColumns = `repeat(${size}, 20px)`;
    map.style.gridTemplateRows = `repeat(${size}, 20px)`;
    for(let i=0; i<size*size; i++){
        const cell = document.createElement("div");
        cell.className = "mini-cell";
        map.appendChild(cell);
    }
    return map;
}

async function previewImages(){
    const container = document.getElementById("previewContainer");
    container.innerHTML = "";
    const sizeMultiplier = parseInt(document.getElementById("size").value);
    const floors = parseInt(document.getElementById("floors").value) || 1;
    const capacity = parseInt(document.getElementById("capacity").value) || 0;
    const color = document.getElementById("color").value;
    const basePrice = parseInt(document.getElementById("basePrice").value) || 150;
    const maxLevel = parseInt(document.getElementById("maxLevel").value) || 5;
    const incomeBonus = parseInt(document.getElementById("incomeBonus").value) || 0;
    const type = document.getElementById("type").value;
    const price = floors * sizeMultiplier * basePrice;

    for(const file of uploadedImages){
        const blob = await resizeImage(file, sizeMultiplier);
        const card = document.createElement("div");
        card.className = "preview-card";
        card.style.border = `2px solid ${color}`;
        card.innerHTML = `
            <img src="${URL.createObjectURL(blob)}">
            <div><b>${document.getElementById("buildingName").value}</b></div>
            <div>Tipo: ${type}</div>
            <div>Pisos: ${floors}</div>
            <div>Capacidad: ${capacity}</div>
            <div>Precio: $${price}</div>
            <div>Nivel max: ${maxLevel}</div>
            <div>Bonus: ${incomeBonus}%</div>
        `;
        card.appendChild(generateMiniMap(sizeMultiplier));
        container.appendChild(card);
    }
}

document.getElementById("imageInput").addEventListener("change", function(event){
    uploadedImages = Array.from(event.target.files);
    updateCapacity();
    previewImages();
});

["type","size","floors","color","basePrice","maxLevel","incomeBonus"].forEach(id=>{
    document.getElementById(id).addEventListener("input", ()=>{ updateCapacity(); previewImages(); });
});

async function generatePlugin(){
    const name = document.getElementById("buildingName").value;
    const type = document.getElementById("type").value;
    const sizeMultiplier = parseInt(document.getElementById("size").value);
    let floors = parseInt(document.getElementById("floors").value);
    if(isNaN(floors) || floors < 1) floors = 1;
    const color = document.getElementById("color").value;
    const basePrice = parseInt(document.getElementById("basePrice").value) || 150;
    const maxLevel = parseInt(document.getElementById("maxLevel").value) || 5;
    const incomeBonus = parseInt(document.getElementById("incomeBonus").value) || 0;

    if(!name || uploadedImages.length === 0){
        alert("Completa los datos y sube al menos una imagen.");
        return;
    }

    const zip = new JSZip();
    const folder = zip.folder(sanitizeFileName(name));

    for(let i=0; i<uploadedImages.length; i++){
        const imgFile = uploadedImages[i];
        const resizedImage = await resizeImage(imgFile, sizeMultiplier);
        const capacity = floors * (sizeMultiplier*sizeMultiplier) * (type==="residential"?8:type==="commercial"?5:4);
        const price = floors * sizeMultiplier * basePrice;

        // Canvas para preview
        const canvas = document.createElement("canvas");
        canvas.width = 150;
        canvas.height = 200;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#2a2a2a";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        const imgObj = await new Promise(res=>{
            const img = new Image();
            img.onload = ()=>res(img);
            img.src = URL.createObjectURL(resizedImage);
        });
        ctx.drawImage(imgObj,25,10,100,100);

        ctx.fillStyle = color;
        ctx.font = "bold 12px Arial";
        ctx.fillText(name,10,130);
        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(`Tipo: ${type}`,10,145);
        ctx.fillText(`Pisos: ${floors}`,10,160);
        ctx.fillText(`Capacidad: ${capacity}`,10,175);
        ctx.fillText(`Precio: $${price}`,10,190);

        const previewBlob = await new Promise(res=>canvas.toBlob(res,"image/png"));

        // JSON completo
        const buildingData = {
            meta:{
                id: sanitizeFileName(name).toLowerCase().replace(/\s+/g,"_") + (i>0?"_"+i:""),
                title: name,
                author: "TheoGen User",
                version: "1.0"
            },
            building:{
                type:type,
                size:sizeMultiplier+"x"+sizeMultiplier,
                floors:floors,
                price: price,
                level: maxLevel,
                capacity: capacity,
                color: color,
                incomeBonus: incomeBonus
            },
            previewImage: `preview_${i+1}.png`
        };

        folder.file(`plugin_${i+1}.json`, JSON.stringify(buildingData,null,4));
        folder.file(`image_${i+1}.png`, resizedImage);
        folder.file(`preview_${i+1}.png`, previewBlob);
    }

    zip.generateAsync({type:"blob"}).then(content=>{
        const link=document.createElement("a");
        link.href=URL.createObjectURL(content);
        link.download=sanitizeFileName(name)+".zip";
        link.click();
    });
}
</script>

</body>
</html>
