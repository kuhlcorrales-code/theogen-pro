<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TheoGen PRO 5.6b Avanzado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body { font-family: Arial; background:#121212; color:white; text-align:center; }
.container { margin-top:30px; }
.card { background:#1e1e1e; padding:20px; width:600px; margin:auto; border-radius:10px; text-align:left; }
label { display:block; margin-top:10px; font-weight:bold; }
input, select { width:95%; padding:8px; margin:5px auto; display:block; }
button { padding:10px; width:95%; margin-top:15px; background:#00c853; border:none; color:white; font-weight:bold; cursor:pointer; }
button:disabled { background:#555; cursor:not-allowed; }
.building-preview { margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center; gap:20px; }
.preview-card { background:#2a2a2a; padding:10px; border-radius:8px; width:250px; text-align:center; display:flex; flex-direction:column; align-items:center; }
.preview-card img { width:150px; height:150px; border-radius:5px; margin-bottom:10px; object-fit:cover; }
.mini-map { margin-top:5px; display:flex; justify-content:center; flex-wrap:wrap; gap:2px; }
.mini-map span { width:20px; height:20px; background:green; display:inline-block; border-radius:3px; }
</style>
</head>
<body>

<div class="container">
<h1>TheoGen PRO 5.6b Avanzado</h1>
<div class="card">

<label for="buildingName">Nombre del Edificio</label>
<input type="text" id="buildingName" placeholder="Ej: casa">

<label for="type">Tipo de Edificio</label>
<select id="type">
<option value="residential">Residencial</option>
<option value="commercial">Comercial</option>
<option value="industrial">Industrial</option>
</select>

<label for="size">Tamaño (1-10)</label>
<input type="number" id="size" placeholder="Ej: 3" min="1" max="10" value="2">

<label for="floors">Número de Pisos</label>
<input type="number" id="floors" placeholder="Ej: 2" min="1" value="1">

<label for="capacity">Capacidad (automática)</label>
<input type="number" id="capacity" readonly>

<label for="basePrice">Precio base por piso</label>
<input type="number" id="basePrice" value="150" min="1">

<label for="maxLevel">Nivel máximo</label>
<input type="number" id="maxLevel" value="5" min="1" max="5">

<label for="incomeBonus">Bonus ingresos (%)</label>
<input type="number" id="incomeBonus" value="0" min="0" max="200">

<label for="imageInput">Imagen del edificio</label>
<input type="file" id="imageInput" accept="image/*" multiple>

<div class="building-preview" id="previewContainer"></div>

<button id="generateBtn" onclick="generatePlugin()" disabled>Generar Plugin Avanzado</button>

</div>
</div>

<script>
let uploadedImages = [];

function getTypeColor(type){
    if(type==="residential") return "#4CAF50";
    if(type==="commercial") return "#2196F3";
    if(type==="industrial") return "#FF9800";
    return "#fff";
}

function sanitizeFileName(name){
    return name.replace(/[^a-z0-9_\- ]/gi,"").trim();
}

function updateCapacity(){
    const type = document.getElementById("type").value;
    const sizeMultiplier = Math.max(parseInt(document.getElementById("size").value)||1,1);
    const floors = Math.max(parseInt(document.getElementById("floors").value)||1,1);
    const base = type==="residential"?8:type==="commercial"?5:4;
    document.getElementById("capacity").value = floors*(sizeMultiplier*sizeMultiplier)*base;
}

// --- Pixelizar imagen ---
async function pixelateImage(file, pixelSize){
    return new Promise(resolve=>{
        const img = new Image();
        img.onload = function(){
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img,0,0);

            const w = Math.max(Math.floor(img.width / pixelSize),1);
            const h = Math.max(Math.floor(img.height / pixelSize),1);
            const temp = document.createElement("canvas");
            temp.width = w; temp.height = h;
            const tctx = temp.getContext("2d");
            tctx.drawImage(canvas,0,0,w,h);

            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(temp,0,0,canvas.width,canvas.height);

            canvas.toBlob(blob=>{
                resolve(blob);
                URL.revokeObjectURL(img.src);
            },"image/png");
        };
        img.src = URL.createObjectURL(file);
    });
}

// --- Crear miniatura ---
async function createThumbnail(file, size=64){
    return new Promise(resolve=>{
        const img = new Image();
        img.onload = function(){
            const canvas = document.createElement("canvas");
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img,0,0,size,size);
            canvas.toBlob(blob=>resolve(blob),"image/png");
            URL.revokeObjectURL(img.src);
        };
        img.src = URL.createObjectURL(file);
    });
}

// --- Crear mini-map PNG ---
async function createMiniMapPNG(capacity, sizeMultiplier){
    const canvas = document.createElement("canvas");
    const total = capacity;
    const cols = sizeMultiplier;
    const rows = Math.ceil(total/cols);
    const cellSize = 20;
    canvas.width = cols*cellSize;
    canvas.height = rows*cellSize;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "green";
    for(let i=0;i<total;i++){
        const x = (i%cols)*cellSize;
        const y = Math.floor(i/cols)*cellSize;
        ctx.fillRect(x,y,cellSize,cellSize);
    }
    return new Promise(resolve=>{
        canvas.toBlob(blob=>resolve(blob),"image/png");
    });
}

// --- Preview ---
async function previewImages(){
    const container=document.getElementById("previewContainer");
    container.innerHTML="";
    const sizeMultiplier = Math.max(parseInt(document.getElementById("size").value)||1,1);
    const floors = Math.max(parseInt(document.getElementById("floors").value)||1,1);
    const capacity = parseInt(document.getElementById("capacity").value)||0;
    const type = document.getElementById("type").value;
    const basePrice = parseInt(document.getElementById("basePrice").value)||150;
    const maxLevel = parseInt(document.getElementById("maxLevel").value)||5;
    const incomeBonus = parseInt(document.getElementById("incomeBonus").value)||0;
    const name = document.getElementById("buildingName").value || "Edificio";
    const price = floors*sizeMultiplier*basePrice;

    for(const file of uploadedImages){
        const pixelBlob = await pixelateImage(file,8);
        const thumbBlob = await createThumbnail(pixelBlob,64);
        const imgURL = URL.createObjectURL(pixelBlob);

        const card=document.createElement("div");
        card.className="preview-card";
        card.style.border=`2px solid ${getTypeColor(type)}`;
        card.innerHTML = `
            <img src="${imgURL}" alt="Imagen de ${name}">
            <div><b>${name}</b></div>
            <div>Tipo: ${type}</div>
            <div>Pisos: ${floors}</div>
            <div>Capacidad: ${capacity}</div>
            <div>Precio: $${price}</div>
            <div>Nivel max: ${maxLevel}</div>
            <div>Bonus: ${incomeBonus}%</div>
            <div class="mini-map">
                ${Array(capacity).fill(0).map(()=>'<span></span>').join('')}
            </div>
        `;
        container.appendChild(card);
    }

    document.getElementById("generateBtn").disabled = uploadedImages.length === 0;
}

document.getElementById("imageInput").addEventListener("change", function(event){
    uploadedImages = Array.from(event.target.files);
    updateCapacity();
    previewImages();
});

["type","size","floors","basePrice","maxLevel","incomeBonus","buildingName"].forEach(id=>{
    document.getElementById(id).addEventListener("input",()=>{
        updateCapacity();
        previewImages();
    });
});

// --- Generar ZIP Avanzado ---
async function generatePlugin(){
    if(!uploadedImages.length){ alert("Sube al menos una imagen."); return; }

    const zip = new JSZip();
    const dataFolder = zip.folder("building_data");

    const config = {
        name: document.getElementById("buildingName").value,
        type: document.getElementById("type").value,
        size: parseInt(document.getElementById("size").value)||1,
        floors: parseInt(document.getElementById("floors").value)||1,
        capacity: parseInt(document.getElementById("capacity").value)||0,
        basePrice: parseInt(document.getElementById("basePrice").value)||150,
        maxLevel: parseInt(document.getElementById("maxLevel").value)||5,
        incomeBonus: parseInt(document.getElementById("incomeBonus").value)||0
    };
    dataFolder.file("config.json", JSON.stringify(config,null,2));

    for(const file of uploadedImages){
        const pixelBlob = await pixelateImage(file,8);
        const thumbBlob = await createThumbnail(pixelBlob,64);
        const mapBlob = await createMiniMapPNG(config.capacity, config.size);

        const safeName = sanitizeFileName(file.name);
        dataFolder.file(safeName, pixelBlob);
        dataFolder.file("thumb_"+safeName, thumbBlob);
        dataFolder.file("map_"+safeName, mapBlob);
    }

    const content = await zip.generateAsync({type:"blob"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(content);
    link.download = `${sanitizeFileName(config.name)}_plugin.zip`;
    link.click();
}
</script>

</body>
</html>
